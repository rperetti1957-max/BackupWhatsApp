name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install All Kivy Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git ccache unzip pkg-config libffi-dev libssl-dev autoconf libtool textinfo libncurses5-dev cmake
          pip3 install --user --upgrade buildozer cython virtualenv

      - name: Build APK
        run: |
          export PATH=$PATH:~/.local/bin
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WhatsAppMover-APK
          path: bin/*.apk
